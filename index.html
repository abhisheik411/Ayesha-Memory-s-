<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ayesha Digital Photo Album - Fast Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 123, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInDown 0.8s ease-out;
        }

        #header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #fff 0%, #007bff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        #page-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #555, #333);
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        #page-counter {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        .thumbnail-wrapper {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
            aspect-ratio: 1;
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 123, 255, 0.3);
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.4s ease;
            display: block;
        }

        .thumbnail-wrapper::after {
            content: '🔍';
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 8px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .thumbnail-wrapper:hover::after {
            opacity: 1;
        }

        .skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2a2a3e 25%, #3a3a4e 50%, #2a2a3e 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite;
            border-radius: 15px;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        #modal-image {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        #modal-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            z-index: 2001;
        }

        #modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #dc3545;
            padding: 12px 20px;
            z-index: 2001;
        }

        #modal-close:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin: 40px auto;
            max-width: 500px;
        }

        .empty-state h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #007bff;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .loading-indicator {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading-indicator::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 10px;
        }

        .image-count {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .valid-count {
            color: #4caf50;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            body { padding: 20px 15px; }
            #header h1 { font-size: 2rem; }
            #grid-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            button { padding: 8px 20px; font-size: 14px; }
            #page-counter { font-size: 1rem; padding: 8px 16px; }
            #modal-controls { bottom: 20px; gap: 12px; padding: 8px 18px; }
            #modal-controls button { padding: 8px 16px; font-size: 12px; }
            #modal-close { top: 10px; right: 10px; padding: 8px 16px; }
        }

        @media (max-width: 480px) {
            #grid-container { grid-template-columns: 1fr; gap: 20px; }
            #page-controls { gap: 15px; }
        }
    </style>
</head>

        const totalCountSpan = document.getElementById('total-count');

        // Optimized: Check images in parallel batches
        async function filterExistingImagesParallel(imageList, batchSize = 20) {
            const existingImages = [];
            const totalImages = imageList.length;
            
            // Show initial loading message
            gridContainer.innerHTML = `<div class="loading-indicator">Loading gallery (0/${totalImages})</div>`;
            
            // Process in batches for better performance
            for (let i = 0; i < imageList.length; i += batchSize) {
                const batch = imageList.slice(i, Math.min(i + batchSize, imageList.length));
                
                // Check all images in batch concurrently
                const batchResults = await Promise.all(
                    batch.map(imgPath => imageExists(imgPath))
                );
                
                // Add valid images from this batch
                batch.forEach((imgPath, idx) => {
                    if (batchResults[idx]) {
                        existingImages.push(imgPath);
                    }
                });
                
                // Update progress
                const processed = Math.min(i + batchSize, totalImages);
                gridContainer.innerHTML = `<div class="loading-indicator">Loading gallery (${processed}/${totalImages})<br>Found ${existingImages.length} images</div>`;
                
                // Small delay to keep UI responsive
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            return existingImages;
        }

        // Optimized image existence check with timeout
        function imageExists(url) {
            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.src = '';
                    resolve(false);
                }, 2000); // 2 second timeout
                
                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(true);
                };
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };
                img.src = url;
            });
        }

        // Optimized rendering with skeleton loading
        function renderGrid() {
            if (validImages.length === 0) {
                gridContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>📷 No Images Found</h3>
                        <p>No valid images were found in the directory.<br>Please check if the image files exist.</p>
                    </div>
                `;
                pageCounter.textContent = `Page 0 of 0`;
                gridPrev.disabled = true;
                gridNext.disabled = true;
                totalCountSpan.innerHTML = `📸 Valid Images: <span class="valid-count">0</span> | Total Checked: ${originalImages.length}`;
                return;
            }
            
            gridContainer.innerHTML = '';
            const start = currentPage * IMAGES_PER_PAGE;
            const end = Math.min(start + IMAGES_PER_PAGE, validImages.length);
            
            // Create skeleton loaders first
            for (let i = start; i < end; i++) {
                const wrapper = document.createElement('div');
                wrapper.classList.add('thumbnail-wrapper');
                wrapper.style.position = 'relative';
                
                const skeleton = document.createElement('div');
                skeleton.classList.add('skeleton');
                
                const thumb = document.createElement('img');
                thumb.src = validImages[i];
                thumb.alt = `Photo ${i + 1}`;
                thumb.classList.add('thumbnail');
                thumb.loading = 'lazy';
                thumb.style.opacity = '0';
                thumb.style.position = 'relative';
                thumb.style.zIndex = '1';
                
                thumb.onload = () => {
                    thumb.style.opacity = '1';
                    if (skeleton && skeleton.parentNode) {
                        skeleton.remove();
                    }
                };
                
                thumb.onclick = () => openModal(i);
                
                wrapper.appendChild(skeleton);
                wrapper.appendChild(thumb);
                gridContainer.appendChild(wrapper);
            }
            
            const totalPages = Math.ceil(validImages.length / IMAGES_PER_PAGE);
            pageCounter.textContent = `Page ${currentPage + 1} of ${totalPages}`;
            gridPrev.disabled = currentPage === 0;
            gridNext.disabled = end >= validImages.length;
            
            totalCountSpan.innerHTML = `📸 ${validImages.length} beautiful memories captured ✨`;
        }

        function openModal(index) {
            if (validImages.length === 0) return;
            modalIndex = index;
            modalImg.src = validImages[modalIndex];
            modalDownload.download = validImages[modalIndex].split('/').pop();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        function nextModal() {
            if (validImages.length === 0) return;
            modalIndex = (modalIndex + 1) % validImages.length;
            modalImg.src = validImages[modalIndex];
            modalDownload.download = validImages[modalIndex].split('/').pop();
        }

        function prevModal() {
            if (validImages.length === 0) return;
            modalIndex = (modalIndex + validImages.length - 1) % validImages.length;
            modalImg.src = validImages[modalIndex];
            modalDownload.download = validImages[modalIndex].split('/').pop();
        }

        gridPrev.onclick = () => {
            if (currentPage > 0) {
                currentPage--;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        gridNext.onclick = () => {
            if ((currentPage + 1) * IMAGES_PER_PAGE < validImages.length) {
                currentPage++;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        modalClose.onclick = closeModal;
        modal.onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        };
        modalPrev.onclick = prevModal;
        modalNext.onclick = nextModal;
        
        modalDownload.onclick = function() {
            if (validImages.length === 0) return;
            const filename = validImages[modalIndex].replace('./', '').replace(/\.[^/.]+$/, ".jpg");
            const a = document.createElement('a');
            a.href = modalImg.src;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        document.onkeydown = (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevModal();
                if (e.key === 'ArrowRight') nextModal();
            }
        };

        // Cache valid images in localStorage for faster subsequent loads
        async function initializeGallery() {
            // Check if we have cached results
            const cached = localStorage.getItem('gallery_cache');
            const cacheTime = localStorage.getItem('gallery_cache_time');
            const now = Date.now();
            
            // Use cache if less than 1 hour old
            if (cached && cacheTime && (now - parseInt(cacheTime)) < 3600000) {
                validImages = JSON.parse(cached);
                renderGrid();
            } else {
                // Load fresh
                validImages = await filterExistingImagesParallel(originalImages, 25);
                
                // Cache the results
                localStorage.setItem('gallery_cache', JSON.stringify(validImages));
                localStorage.setItem('gallery_cache_time', now.toString());
                
                renderGrid();
            }
        }
        
        // Start the gallery initialization
        initializeGallery();
    </script>
</body>
</html>
