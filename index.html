<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ayesha Digital Photo Album - Fast Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px 15px;
        }

        #header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        #header h1 {
            font-size: clamp(1.5rem, 8vw, 3rem);
            background: linear-gradient(135deg, #fff 0%, #007bff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        #header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.8rem, 4vw, 1rem);
        }

        #page-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.3);
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: linear-gradient(135deg, #555, #333);
            cursor: not-allowed;
            opacity: 0.5;
        }

        #page-counter {
            font-size: 1rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .thumbnail-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            aspect-ratio: 1;
            cursor: pointer;
        }

        .thumbnail-wrapper:active {
            transform: scale(0.98);
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }

        .skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2a2a3e 25%, #3a3a4e 50%, #2a2a3e 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            touch-action: pan-x pan-y;
        }

        #modal-image {
            max-width: 95%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #modal-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 2001;
            flex-wrap: wrap;
            justify-content: center;
        }

        #modal-controls button {
            padding: 8px 16px;
            font-size: 12px;
            min-height: 40px;
        }

        #modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #dc3545;
            padding: 8px 16px;
            z-index: 2001;
            min-width: 60px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin: 40px auto;
            max-width: 500px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #007bff;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            word-break: break-word;
        }

        .loading-indicator {
            text-align: center;
            padding: 40px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .error-message {
            text-align: center;
            padding: 40px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 12px;
            margin: 20px;
            color: #ff6b6b;
        }

        .image-count {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .valid-count {
            color: #4caf50;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #grid-container { 
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
                gap: 15px;
            }
            #modal-controls { 
                bottom: 15px; 
                gap: 10px; 
                padding: 8px 15px;
            }
            #modal-controls button { 
                padding: 6px 12px; 
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            #grid-container { 
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
                gap: 12px;
            }
            #page-controls { 
                gap: 10px;
            }
            button { 
                padding: 8px 16px; 
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            #grid-container { 
                grid-template-columns: 1fr 1fr; 
                gap: 10px;
            }
            #header h1 { 
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

        <h1>✨ Ayesha's Digital Album ✨</h1>

        let currentPage = 0;

        const gridContainer = document.getElementById('grid-container');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-image');
        const modalClose = document.getElementById('modal-close');
        const modalPrev = document.getElementById('modal-prev');
        const modalNext = document.getElementById('modal-next');
        const modalDownload = document.getElementById('modal-download');
        const pageCounter = document.getElementById('page-counter');
        const gridPrev = document.getElementById('grid-prev');
        const gridNext = document.getElementById('grid-next');
        const totalCountSpan = document.getElementById('total-count');

        // Optimized image existence check with better error handling
        function imageExists(url) {
            return new Promise((resolve) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    img.src = '';
                    resolve(false);
                }, 3000);
                
                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(true);
                };
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };
                img.src = url;
            });
        }

        // Filter images with progress tracking
        async function filterExistingImages(imageList, batchSize = 15) {
            const existingImages = [];
            const totalImages = imageList.length;
            
            gridContainer.innerHTML = `<div class="loading-indicator">📸 Loading ${totalImages} images...<br>Please wait</div>`;
            
            for (let i = 0; i < imageList.length; i += batchSize) {
                const batch = imageList.slice(i, Math.min(i + batchSize, imageList.length));
                const batchResults = await Promise.all(batch.map(imgPath => imageExists(imgPath)));
                
                batch.forEach((imgPath, idx) => {
                    if (batchResults[idx]) {
                        existingImages.push(imgPath);
                    }
                });
                
                const processed = Math.min(i + batchSize, totalImages);
                if (gridContainer) {
                    gridContainer.innerHTML = `<div class="loading-indicator">📸 Loading gallery...<br>${processed}/${totalImages} checked<br>Found ${existingImages.length} images</div>`;
                }
                
                await new Promise(resolve => setTimeout(resolve, 50));
            }
            
            return existingImages;
        }

        // Render grid with error handling
        function renderGrid() {
            if (!gridContainer) return;
            
            if (validImages.length === 0) {
                gridContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>📷 No Images Found</h3>
                        <p>No valid images were found. Please make sure the image files exist in the same directory as this HTML file.</p>
                        <p style="margin-top: 15px; font-size: 0.8rem;">💡 Tip: Check if the image files are in the correct location</p>
                    </div>
                `;
                pageCounter.textContent = `Page 0 of 0`;
                gridPrev.disabled = true;
                gridNext.disabled = true;
                totalCountSpan.innerHTML = `📸 Valid Images: <span class="valid-count">0</span> | Checked: ${originalImages.length}`;
                return;
            }
            
            gridContainer.innerHTML = '';
            const start = currentPage * IMAGES_PER_PAGE;
            const end = Math.min(start + IMAGES_PER_PAGE, validImages.length);
            
            for (let i = start; i < end; i++) {
                const wrapper = document.createElement('div');
                wrapper.classList.add('thumbnail-wrapper');
                
                const skeleton = document.createElement('div');
                skeleton.classList.add('skeleton');
                
                const thumb = document.createElement('img');
                thumb.src = validImages[i];
                thumb.alt = `Memory ${i + 1}`;
                thumb.classList.add('thumbnail');
                thumb.loading = 'lazy';
                thumb.style.opacity = '0';
                
                thumb.onload = () => {
                    thumb.style.opacity = '1';
                    if (skeleton && skeleton.parentNode) {
                        skeleton.remove();
                    }
                };
                
                thumb.onerror = () => {
                    if (skeleton && skeleton.parentNode) {
                        skeleton.remove();
                    }
                };
                
                thumb.onclick = () => openModal(i);
                
                wrapper.appendChild(skeleton);
                wrapper.appendChild(thumb);
                gridContainer.appendChild(wrapper);
            }
            
            const totalPages = Math.ceil(validImages.length / IMAGES_PER_PAGE);
            pageCounter.textContent = `Page ${currentPage + 1} of ${totalPages}`;
            gridPrev.disabled = currentPage === 0;
            gridNext.disabled = end >= validImages.length;
            
            totalCountSpan.innerHTML = `📸 ${validImages.length} beautiful memories captured ✨`;
        }

        function openModal(index) {
            if (validImages.length === 0 || !validImages[index]) return;
            modalIndex = index;
            modalImg.src = validImages[modalIndex];
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        function nextModal() {
            if (validImages.length === 0) return;
            modalIndex = (modalIndex + 1) % validImages.length;
            modalImg.src = validImages[modalIndex];
        }

        function prevModal() {
            if (validImages.length === 0) return;
            modalIndex = (modalIndex + validImages.length - 1) % validImages.length;
            modalImg.src = validImages[modalIndex];
        }

        // Event handlers with touch support
        gridPrev.onclick = () => {
            if (currentPage > 0) {
                currentPage--;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        gridNext.onclick = () => {
            if ((currentPage + 1) * IMAGES_PER_PAGE < validImages.length) {
                currentPage++;
                renderGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        modalClose.onclick = closeModal;
        modal.onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        };
        modalPrev.onclick = prevModal;
        modalNext.onclick = nextModal;
        
        modalDownload.onclick = function() {
            if (validImages.length === 0 || !validImages[modalIndex]) return;
            try {
                const a = document.createElement('a');
                a.href = modalImg.src;
                a.download = validImages[modalIndex].split('/').pop() || 'image.jpg';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => document.body.removeChild(a), 100);
            } catch (e) {
                console.error('Download failed:', e);
            }
        };

        document.onkeydown = (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') prevModal();
                if (e.key === 'ArrowRight') nextModal();
            }
        };

        // Touch swipe support for modal
        let touchStartX = 0;
        let touchEndX = 0;
        
        modal.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        modal.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) > 50) {
                if (swipeDistance > 0) {
                    prevModal();
                } else {
                    nextModal();
                }
            }
        });

        // Initialize gallery with error handling
        async function initializeGallery() {
            try {
                // Check if localStorage is available
                let useCache = false;
                try {
                    if (localStorage) useCache = true;
                } catch(e) {
                    console.log('localStorage not available');
                }
                
                if (useCache) {
                    const cached = localStorage.getItem('gallery_cache');
                    const cacheTime = localStorage.getItem('gallery_cache_time');
                    const now = Date.now();
                    
                    if (cached && cacheTime && (now - parseInt(cacheTime)) < 3600000) {
                        validImages = JSON.parse(cached);
                        if (validImages && validImages.length > 0) {
                            renderGrid();
                            return;
                        }
                    }
                }
                
                validImages = await filterExistingImages(originalImages, 15);
                
                if (useCache && validImages && validImages.length > 0) {
                    try {
                        localStorage.setItem('gallery_cache', JSON.stringify(validImages));
                        localStorage.setItem('gallery_cache_time', Date.now().toString());
                    } catch(e) {
                        console.log('Failed to cache images');
                    }
                }
                
                renderGrid();
            } catch (error) {
                console.error('Initialization error:', error);
                gridContainer.innerHTML = `<div class="error-message">⚠️ Error loading gallery: ${error.message}<br>Please refresh the page or check console for details.</div>`;
            }
        }
        
        // Start the gallery with a slight delay to ensure DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeGallery);
        } else {
            initializeGallery();
        }
    </script>
</body>
</html>
